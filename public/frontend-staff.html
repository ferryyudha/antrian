<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Queue Validator</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        #reader {
            width: 100%;
            border-radius: 1rem;
            overflow: hidden;
            border: 2px dashed #cbd5e1;
            background: #f1f5f9;
        }

        .data-card {
            display: none;
            margin-top: 1.5rem;
            padding: 1.25rem;
            background: #f1f5f9;
            border-radius: 1rem;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.9375rem;
        }

        .data-label {
            color: var(--text-muted);
        }

        .data-value {
            font-weight: 600;
        }

        .input-group {
            margin-top: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.75rem;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            margin-top: 1rem;
            border: none;
            border-radius: 0.75rem;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        #message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 0.75rem;
            text-align: center;
            font-size: 0.875rem;
            display: none;
        }

        .success-msg {
            background: #d1fae5;
            color: #065f46;
            display: block !important;
        }

        .error-msg {
            background: #fee2e2;
            color: #991b1b;
            display: block !important;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Staff Dashboard</h1>
    
    <p class="subtitle">Scan QR User untuk verifikasi antrian</p>

    <div id="reader"></div>

    <div id="dataCard" class="data-card">
        <div class="data-row">
            <span class="data-label">Nomor Antrian:</span>
            <span id="resQueueNumber" class="data-value">-</span>
        </div>
        <div class="data-row">
            <span class="data-label">NIK:</span>
            <span id="resNik" class="data-value">-</span>
        </div>
        <div class="data-row">
            <span class="data-label">KK:</span>
            <span id="resKk" class="data-value">-</span>
        </div>

        <div class="input-group">
            <label for="locationCode">Kode Toko</label>
            <input type="text" id="locationCode" placeholder="Masukkan kode toko...">
        </div>

        <button id="btnVerify">Verifikasi</button>
    </div>

    <div id="message"></div>
</div>

<script src="https://unpkg.com/html5-qrcode" defer></script>
<script>
    let mode = 'queue'; // 'queue' or 'attendance'
    let html5QrCode = null;
    const dataCard = document.getElementById('dataCard');
    const message = document.getElementById('message');
    const subtext = document.getElementById('subtext');
    const locationInput = document.getElementById('locationCode');
    let currentQrToken = null;
    let isScanning = false;

    const qrConfig = { fps: 15, qrbox: { width: 250, height: 250 } };

    // Auto-fill location code from localStorage
    window.addEventListener('DOMContentLoaded', () => {
        const savedCode = localStorage.getItem('staff_location_code');
        if (savedCode) {
            locationInput.value = savedCode;
        }

        // Check for token in URL (Auto-verify from direct scan)
        const urlParams = new URLSearchParams(window.location.search);
        const tokenFromUrl = urlParams.get('token');
        
        if (tokenFromUrl) {
            currentQrToken = tokenFromUrl;
            fetchPreview(tokenFromUrl);
            return; // Don't start scanner if we already have a token
        }
        
        // Wait for script to load before starting scanner
        const checkScript = setInterval(() => {
            if (typeof Html5Qrcode !== 'undefined') {
                clearInterval(checkScript);
                html5QrCode = new Html5Qrcode("reader");
                startScanner();
            }
        }, 100);
    });

    function switchTab(newMode) {
        // Feature removed as requested
    }

    const onScanSuccess = (decodedText, decodedResult) => {
        if (!isScanning) return;
        currentQrToken = decodedText;
        isScanning = false;
        
        html5QrCode.stop().then(() => {
            document.getElementById('reader').style.display = 'none';
            if (mode === 'queue') fetchPreview(decodedText);
            else processAttendance(decodedText);
        }).catch(err => {
            console.error("Failed to stop scanner", err);
            // Fallback if stop fails
            document.getElementById('reader').style.display = 'none';
            if (mode === 'queue') fetchPreview(decodedText);
            else processAttendance(decodedText);
        });
    };

    function startScanner() {
        if (!html5QrCode) return;
        document.getElementById('reader').style.display = 'block';
        dataCard.style.display = 'none';
        message.style.display = 'none';
        
        html5QrCode.start({ facingMode: "environment" }, qrConfig, onScanSuccess)
                   .then(() => isScanning = true)
                   .catch(err => {
                       console.log("Scanner failed to start", err);
                       message.innerText = "Gagal membuka kamera. Pastikan izin kamera diberikan.";
                       message.className = "error-msg";
                   });
    }

    async function processAttendance(token) {
        try {
            const response = await fetch('/api/attendance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ qr_token: token })
            });
            const result = await response.json();
            
            showMessage(result.message, result.status === 'success' ? 'success' : 'error');
            softReset();
        } catch (e) {
            showMessage('Gagal menghubungi server', 'error');
            softReset();
        }
    }

    async function fetchPreview(token) {
        try {
            const response = await fetch('/api/queue/scan-preview', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ qr_token: token })
            });
            const result = await response.json();

            if (result.status === 'success') {
                document.getElementById('resQueueNumber').innerText = result.data.queue_number;
                document.getElementById('resNik').innerText = result.data.nik;
                document.getElementById('resKk').innerText = result.data.kk;
                dataCard.style.display = 'block';

                // If already verified, show success screen immediately
                if (result.data.is_verified) {
                    showMessage('Verifikasi berhasil, antrian diproses', 'success');
                    document.querySelector('.input-group').style.display = 'none';
                    document.getElementById('btnVerify').style.display = 'none';
                    setTimeout(() => softReset(), 5000);
                } else {
                    document.querySelector('.input-group').style.display = 'block';
                    document.getElementById('btnVerify').style.display = 'block';
                }
            } else {
                showMessage(result.message, 'error');
                softReset();
            }
        } catch (err) {
            showMessage('Gagal menghubungi server', 'error');
            softReset();
        }
    }

    document.getElementById('btnVerify').addEventListener('click', async () => {
        const locationCode = locationInput.value;
        if (!locationCode) return Swal ? Swal.fire('Peringatan', 'Masukkan kode toko', 'warning') : alert('Masukkan kode toko');

        // Save to local storage for next time
        localStorage.setItem('staff_location_code', locationCode);

        const btn = document.getElementById('btnVerify');
        btn.disabled = true;
        btn.innerText = 'Memproses...';

        try {
            const response = await fetch('/api/queue/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    qr_token: currentQrToken,
                    location_code: locationCode
                })
            });
            const result = await response.json();

            if (result.status === 'success') {
                showMessage(result.message, 'success');
                // Hide inputs for a clean success screen
                document.querySelector('.input-group').style.display = 'none';
                btn.style.display = 'none';
                
                // Automatically reset to camera after 5 seconds
                setTimeout(() => softReset(), 5000);
            } else {
                showMessage(result.message, 'error');
                btn.disabled = false;
                btn.innerText = 'Verifikasi';
            }
        } catch (err) {
            showMessage('Gagal verifikasi', 'error');
            btn.disabled = false;
            btn.innerText = 'Verifikasi';
        }
    });

    function showMessage(msg, type) {
        message.innerText = msg;
        message.className = type === 'success' ? 'success-msg' : 'error-msg';
        message.style.display = 'block';
    }

    function softReset() {
        dataCard.style.display = 'none';
        message.style.display = 'none';
        const btn = document.getElementById('btnVerify');
        btn.disabled = false;
        btn.style.display = 'block';
        btn.innerText = 'Verifikasi';
        
        // Restore input visibility for the next scan
        document.querySelector('.input-group').style.display = 'block';
        
        startScanner();
    }
</script>

</body>
</html>
